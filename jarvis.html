<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>JARVIS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #090c10;
      --panel: #11171d;
      --line: #27343f;
      --text: #eff5f7;
      --muted: #9aa7b1;
      --blue: #57a8ff;
      --cyan: #4ecdc4;
      --green: #45d48f;
      --amber: #f2b84b;
      --red: #ff6b6b;
      --glow: rgba(87, 168, 255, 0.35);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(12,17,22,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--blue);
    }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .header-actions a, .header-actions button {
      background: none; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer; text-decoration: none;
      padding: 6px 10px; border-radius: 8px;
      transition: all .2s;
    }
    .header-actions a:hover, .header-actions button:hover {
      color: var(--text); background: rgba(255,255,255,.05);
    }

    /* Main area */
    .jarvis-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 18px;
      overflow: hidden;
    }

    /* Orb */
    .orb-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 0 16px;
      flex-shrink: 0;
    }
    .orb {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #1a3a5c 0%, #0d1f33 50%, #0a1628 100%);
      box-shadow:
        0 0 40px var(--glow),
        0 0 80px rgba(87,168,255,.12),
        inset 0 0 30px rgba(87,168,255,.08);
      cursor: pointer;
      position: relative;
      transition: box-shadow .5s, transform .3s;
      -webkit-tap-highlight-color: transparent;
    }
    .orb:active { transform: scale(.95); }

    .orb::before, .orb::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid rgba(87,168,255,.2);
      opacity: 0;
      transition: opacity .4s;
    }
    .orb::after { inset: -14px; border-color: rgba(87,168,255,.1); }

    /* Idle pulse */
    .orb.idle::before {
      opacity: 1;
      animation: pulse-ring 3s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: .6; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    /* Listening */
    .orb.listening {
      box-shadow:
        0 0 60px rgba(87,168,255,.55),
        0 0 120px rgba(87,168,255,.2),
        inset 0 0 40px rgba(87,168,255,.15);
    }
    .orb.listening::before {
      opacity: 1;
      animation: listen-ring 1.2s ease-out infinite;
    }
    .orb.listening::after {
      opacity: 1;
      animation: listen-ring 1.2s ease-out .4s infinite;
    }
    @keyframes listen-ring {
      0% { transform: scale(1); opacity: .8; border-color: rgba(87,168,255,.4); }
      100% { transform: scale(1.8); opacity: 0; border-color: rgba(87,168,255,0); }
    }

    /* Processing */
    .orb.processing {
      box-shadow:
        0 0 50px rgba(78,205,196,.4),
        0 0 100px rgba(78,205,196,.15),
        inset 0 0 30px rgba(78,205,196,.1);
    }
    .orb.processing::before {
      opacity: 1;
      inset: -10px;
      border: 2px solid transparent;
      border-top-color: var(--cyan);
      border-right-color: var(--cyan);
      animation: spin 1s linear infinite;
    }
    .orb.processing::after {
      opacity: 1;
      inset: -20px;
      border: 1.5px solid transparent;
      border-bottom-color: var(--blue);
      animation: spin 1.5s linear reverse infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Speaking */
    .orb.speaking {
      box-shadow:
        0 0 60px rgba(69,212,143,.45),
        0 0 120px rgba(69,212,143,.15),
        inset 0 0 30px rgba(69,212,143,.1);
    }
    .orb.speaking::before {
      opacity: 1;
      animation: speak-ring 1.5s ease-out infinite;
      border-color: rgba(69,212,143,.3);
    }
    @keyframes speak-ring {
      0% { transform: scale(1); opacity: .7; }
      50% { transform: scale(1.15); opacity: .4; }
      100% { transform: scale(1); opacity: .7; }
    }

    /* Error */
    .orb.error {
      box-shadow:
        0 0 60px rgba(255,107,107,.45),
        0 0 100px rgba(255,107,107,.15);
      animation: error-flash .3s ease 2;
    }
    @keyframes error-flash {
      50% { box-shadow: 0 0 80px rgba(255,107,107,.7); }
    }

    /* Status */
    .status {
      font-size: 14px;
      color: var(--muted);
      margin-top: 14px;
      text-align: center;
      min-height: 22px;
      transition: color .3s;
    }
    .status.active { color: var(--blue); }
    .status.speaking { color: var(--green); }

    /* Interim text */
    .interim {
      font-size: 15px;
      color: rgba(87,168,255,.6);
      text-align: center;
      min-height: 24px;
      margin-top: 8px;
      font-style: italic;
      max-width: 90%;
      word-break: break-word;
    }

    /* Conversation */
    .conversation {
      flex: 1;
      width: 100%;
      max-width: 600px;
      overflow-y: auto;
      padding: 12px 0 100px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .conversation::-webkit-scrollbar { width: 4px; }
    .conversation::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .msg {
      margin: 8px 0;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 88%;
      word-break: break-word;
      animation: msg-in .3s ease;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      background: rgba(87,168,255,.12);
      border: 1px solid rgba(87,168,255,.2);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .msg.jarvis {
      background: var(--panel);
      border: 1px solid var(--line);
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    .msg.jarvis .label {
      font-size: 11px;
      font-weight: 800;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .msg pre {
      white-space: pre-wrap;
      font-family: inherit;
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }
    .msg table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 13px;
    }
    .msg th, .msg td {
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid var(--line);
    }
    .msg th { color: var(--muted); font-size: 11px; text-transform: uppercase; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
      background: rgba(9,12,16,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10;
    }
    .bottom-bar input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .bottom-bar input:focus { border-color: var(--blue); }
    .bottom-bar input::placeholder { color: var(--muted); }
    .mic-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--blue);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }
    .mic-btn:active { transform: scale(.9); }
    .mic-btn.active { background: var(--red); animation: mic-pulse 1s ease infinite; }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.4); }
      50% { box-shadow: 0 0 0 10px rgba(255,107,107,0); }
    }

    /* Settings drawer */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .settings-overlay.open { opacity: 1; pointer-events: auto; }
    .settings-drawer {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(340px, 85vw);
      background: var(--panel);
      border-left: 1px solid var(--line);
      z-index: 100;
      transform: translateX(100%);
      transition: transform .3s ease;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .settings-drawer.open { transform: translateX(0); }
    .settings-drawer h2 { font-size: 16px; color: var(--blue); letter-spacing: 2px; }
    .settings-drawer label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
    }
    .settings-drawer input, .settings-drawer select {
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .settings-drawer .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .settings-drawer .toggle-row span { font-size: 13px; color: var(--text); }
    .toggle {
      width: 44px; height: 24px;
      background: var(--line);
      border-radius: 12px;
      border: none;
      position: relative;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle.on { background: var(--blue); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform .2s;
    }
    .toggle.on::after { transform: translateX(20px); }
    .conn-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; padding: 10px 12px;
      background: var(--bg); border-radius: 8px;
    }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
    }
    .conn-dot.connected { background: var(--green); }

    /* Not supported banner */
    .not-supported {
      background: rgba(255,107,107,.1);
      border: 1px solid rgba(255,107,107,.3);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin: 20px;
      font-size: 14px;
      color: var(--red);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: all .3s;
      z-index: 50;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>JARVIS</h1>
    <div class="header-actions">
      <a href="index.html">Dashboard</a>
      <button id="clearBtn" aria-label="Limpiar" title="Limpiar conversacion">&#128465;</button>
      <button id="settingsBtn" aria-label="Settings">&#9881;</button>
    </div>
  </header>

  <div class="jarvis-main">
    <div class="orb-zone">
      <div class="orb idle" id="orb" role="button" aria-label="Activar Jarvis" tabindex="0"></div>
      <div class="status" id="status">Toca para hablar</div>
      <div class="interim" id="interim"></div>
    </div>

    <div class="conversation" id="conversation"></div>
  </div>

  <div class="bottom-bar">
    <input type="text" id="textInput" placeholder="Escribe o toca el micrófono..." autocomplete="off">
    <button class="mic-btn" id="micBtn" aria-label="Micrófono">&#127908;</button>
  </div>

  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-drawer" id="settingsDrawer">
    <h2>CONFIGURACION</h2>

    <label>
      Ollama URL
      <input type="url" id="ollamaUrl" value="http://localhost:11434" placeholder="http://localhost:11434">
    </label>

    <label>
      Modelo
      <input type="text" id="ollamaModel" value="llama3.1:8b" placeholder="llama3.1:8b">
    </label>

    <div class="conn-status" id="connStatus">
      <span class="conn-dot" id="connDot"></span>
      <span id="connText">Ollama: desconectado</span>
    </div>

    <button id="testConn" style="background:var(--blue);border:none;color:white;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;">Probar conexion</button>

    <label>
      Voz de JARVIS
      <select id="voiceSelect"></select>
    </label>

    <label>
      Velocidad de voz
      <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1">
    </label>

    <div class="toggle-row">
      <span>Wake word "Jarvis"</span>
      <button class="toggle" id="wakeToggle" aria-label="Toggle wake word"></button>
    </div>

    <div class="toggle-row">
      <span>Voz en respuestas</span>
      <button class="toggle on" id="ttsToggle" aria-label="Toggle TTS"></button>
    </div>

    <div class="toggle-row">
      <span>Modo continuo</span>
      <button class="toggle" id="continuousToggle" aria-label="Toggle continuous"></button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Config & State ──────────────────────────────────────────

    const STATES = { IDLE: 'idle', LISTENING: 'listening', PROCESSING: 'processing', SPEAKING: 'speaking', ERROR: 'error' };
    let state = STATES.IDLE;
    let ollamaConnected = false;
    let wakeWordEnabled = false;
    let ttsEnabled = true;
    let continuousMode = false;
    let currentUtterance = null;

    const SYSTEM_PROMPT = `Eres JARVIS, el asistente personal de Jorge Luis Silva Almeida.

## Personalidad
- Formal en reportes y analisis, casual y directo en conversacion
- Eficiente, proactivo, siempre sugieres el siguiente paso logico
- Siempre responde en espanol
- Humor rapido e inteligente cuando sea apropiado
- Piensa fuera de la caja, forward-thinking
- No sugar-coat: di las cosas como son, sin endulzar
- Respuestas concisas pero completas. Numeros y metricas sobre opiniones.

## Quien es Jorge
- Cubano radicado en Florida (Pembroke Pines)
- Director of Operations en Robotic Imaging (captura y documentacion digital: Matterport, Leica BLK)
- Trader activo: Forex (EURUSD, metodologia SMC/ICT, LIT, IPA/EPA, CHOCH) y opciones (framework institucional)
- Emprendedor: TRAVIA Logistics / TRAVIA Holding Group (transporte refrigerado)
- Fotografo profesional, videografo, piloto certificado de drones (ex Telemundo/NBC)
- Equipos: Leica M6, Voigtlander, Insta360, builds de PC custom con liquid cooling
- Intereses: tech, AI, ciencia, exploracion espacial, mercados, hardware, fotografia, moda, viajes
- Apodos: "cosita" (pareja), "maja" (amigo Marcos), Jorge/George

## Trading
- Forex: EURUSD con SMC/ICT en MT4/MT5, Pine Script + PineConnector, VPS en NY
- Opciones: framework institucional — Regimen > Expected Move > IV/RV > Skew > Catalyst > Liquidez > Estructura > Riesgo
- 5 activos core: SPX, QQQ, IWM, NVDA, TLT + universo de 50 activos
- Regla dura: no naked options, riesgo definido siempre
- Cuenta base $10K, max $200/trade, max $400 perdida diaria, meta $500-$800/mes
- Score 8-10: trade A | 6-7: trade pequeno | 0-5: no trade
- Robin Hood Agent: escaner de opciones en desarrollo con API Schwab/thinkorswim

## Watchlist actual
NVDA (7.2, positivo), MSFT (7.0, positivo), 2454.TW MediaTek (7.1, positivo), QCOM (6.4, negativo), INTC (6.1, negativo), AMD (6.0, mixto), AAPL (5.8, mixto)

## Skills
- Research: investigar acciones/noticias, scorecard de 8 metricas (Truth, Confidence, Edge, Opportunity, Risk, Timing, Actionability, Asymmetry). Buy 8+, Watch 6-7.9, Skip <6.
- Trading: watchlist, alertas, opciones, backtests
- Email: triage, resumen, respuestas sugeridas
- Social: posts Instagram/Facebook
- Daily: brief matutino, cierre del dia

## Reglas
- No inventes datos financieros. Si no tienes dato, di "pendiente de verificar"
- Sugiere el siguiente paso logico despues de cada tarea
- Usa metricas y numeros concretos cuando sea posible
- Si Jorge pregunta sobre opciones, usa el framework institucional como base`;

    // ── Local Data (from vault) ─────────────────────────────────

    const WATCHLIST = [
      { ticker: 'NVDA', name: 'NVIDIA', sentiment: 'positivo', score: 7.2 },
      { ticker: 'MSFT', name: 'Microsoft', sentiment: 'positivo', score: 7.0 },
      { ticker: '2454.TW', name: 'MediaTek', sentiment: 'positivo', score: 7.1 },
      { ticker: 'QCOM', name: 'Qualcomm', sentiment: 'negativo', score: 6.4 },
      { ticker: 'INTC', name: 'Intel', sentiment: 'negativo', score: 6.1 },
      { ticker: 'AMD', name: 'AMD', sentiment: 'mixto', score: 6.0 },
      { ticker: 'AAPL', name: 'Apple', sentiment: 'mixto', score: 5.8 },
    ];

    const SKILLS_INFO = [
      { name: 'Research', trigger: '"investiga", "analiza [TICKER]"', desc: 'Investigacion con scorecard de 8 metricas' },
      { name: 'Trading', trigger: '"watchlist", "alerta", "backtest"', desc: 'Watchlist, alertas, opciones' },
      { name: 'Email', trigger: '"correos", "triage", "responde"', desc: 'Gestion de correo' },
      { name: 'Social', trigger: '"genera post", "crea carrusel"', desc: 'Contenido IG/FB' },
      { name: 'Daily', trigger: '"que hay para hoy", "cierra el dia"', desc: 'Brief diario' },
    ];

    // ── DOM ──────────────────────────────────────────────────────

    const orb = document.getElementById('orb');
    const statusEl = document.getElementById('status');
    const interimEl = document.getElementById('interim');
    const conversation = document.getElementById('conversation');
    const textInput = document.getElementById('textInput');
    const micBtn = document.getElementById('micBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsDrawer = document.getElementById('settingsDrawer');
    const settingsOverlay = document.getElementById('settingsOverlay');

    // ── Speech Recognition ──────────────────────────────────────

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'es-MX';
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        setState(STATES.LISTENING);
      };

      recognition.onresult = (event) => {
        let interim = '';
        let final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            final += t;
          } else {
            interim += t;
          }
        }
        interimEl.textContent = interim;
        if (final) {
          interimEl.textContent = '';
          handleInput(final.trim());
        }
      };

      recognition.onerror = (event) => {
        if (event.error === 'no-speech') {
          setState(STATES.IDLE);
          return;
        }
        if (event.error === 'aborted') return;
        setState(STATES.ERROR);
        setTimeout(() => setState(STATES.IDLE), 2000);
      };

      recognition.onend = () => {
        if (state === STATES.LISTENING) {
          if (continuousMode) {
            try { recognition.start(); } catch {}
          } else {
            setState(STATES.IDLE);
          }
        }
      };
    } else {
      document.querySelector('.orb-zone').innerHTML =
        '<div class="not-supported">Tu navegador no soporta reconocimiento de voz.<br>Usa Chrome o Edge para la experiencia completa.</div>';
    }

    // ── Speech Synthesis ────────────────────────────────────────

    const synth = window.speechSynthesis;
    let selectedVoice = null;

    function loadVoices() {
      const voices = synth.getVoices();
      const select = document.getElementById('voiceSelect');
      select.innerHTML = '';
      const esVoices = voices.filter(v => v.lang.startsWith('es'));
      const toList = esVoices.length ? esVoices : voices.slice(0, 10);
      toList.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        select.appendChild(opt);
      });
      selectedVoice = toList[0] || null;
      select.onchange = () => { selectedVoice = toList[select.value] || null; };
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
      if (!ttsEnabled || !synth) return Promise.resolve();
      return new Promise((resolve) => {
        synth.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'es-MX';
        utt.rate = parseFloat(document.getElementById('voiceRate').value) || 1;
        if (selectedVoice) utt.voice = selectedVoice;
        currentUtterance = utt;
        utt.onend = () => { currentUtterance = null; resolve(); };
        utt.onerror = () => { currentUtterance = null; resolve(); };
        setState(STATES.SPEAKING);
        synth.speak(utt);
      });
    }

    function stopSpeaking() {
      synth.cancel();
      currentUtterance = null;
    }

    // ── State Machine ───────────────────────────────────────────

    function setState(newState) {
      state = newState;
      orb.className = 'orb ' + newState;

      const messages = {
        idle: 'Toca para hablar',
        listening: 'Escuchando...',
        processing: 'Pensando...',
        speaking: 'Hablando...',
        error: 'Error — intenta de nuevo'
      };
      statusEl.textContent = messages[newState] || '';
      statusEl.className = 'status' + (newState === STATES.LISTENING ? ' active' : '') + (newState === STATES.SPEAKING ? ' speaking' : '');
      micBtn.classList.toggle('active', newState === STATES.LISTENING);
    }

    // ── Toggle Listening ────────────────────────────────────────

    function toggleListening() {
      if (!recognition) return;

      if (state === STATES.SPEAKING) {
        stopSpeaking();
        setState(STATES.IDLE);
        return;
      }

      if (state === STATES.LISTENING) {
        recognition.stop();
        setState(STATES.IDLE);
        return;
      }

      interimEl.textContent = '';
      try { recognition.start(); } catch {}
    }

    // ── Input Handler ───────────────────────────────────────────

    async function handleInput(text) {
      if (!text) return;
      addMessage(text, 'user');

      const lower = text.toLowerCase();

      // Wake word filter
      const cleaned = lower.replace(/^(hey\s+)?jarvis[,.\s]*/i, '').trim();
      if (!cleaned && /jarvis/i.test(lower)) {
        const resp = 'Dime, Jorge. ¿En que te puedo ayudar?';
        addMessage(resp, 'jarvis');
        await speak(resp);
        setState(STATES.IDLE);
        return;
      }
      const query = cleaned || text;

      setState(STATES.PROCESSING);

      // Try local skill handlers first
      const localResponse = tryLocalSkill(query.toLowerCase(), query);
      if (localResponse) {
        addMessage(localResponse, 'jarvis', true);
        await speak(stripHtml(localResponse));
        setState(STATES.IDLE);
        if (continuousMode && recognition) try { recognition.start(); } catch {}
        return;
      }

      // Try Ollama (streaming — message added inside queryOllama)
      if (ollamaConnected) {
        const aiResponse = await queryOllama(query);
        if (aiResponse) {
          await speak(aiResponse);
          setState(STATES.IDLE);
          if (continuousMode && recognition) try { recognition.start(); } catch {}
          return;
        }
      }

      // Fallback: copy to clipboard for Claude Code
      const fallback = formatFallback(query);
      addMessage(fallback, 'jarvis', true);
      await speak('No tengo Ollama conectado. Copié tu pregunta para que la pegues en Claude Code.');
      try { await navigator.clipboard.writeText(query); } catch {}
      setState(STATES.IDLE);
    }

    // ── Local Skill Detection ───────────────────────────────────

    function tryLocalSkill(lower, original) {
      // Greeting
      if (/^(hola|buenos?\s*d[ií]as?|buenas|hey|que\s*tal)/.test(lower)) {
        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Buenos dias' : hour < 18 ? 'Buenas tardes' : 'Buenas noches';
        return `${greeting}, Jorge. Tienes ${WATCHLIST.length} acciones en watchlist. ¿Quieres el brief del dia o revisar algo especifico?`;
      }

      // Watchlist
      if (/watchlist|acciones|stocks|portafolio|que\s*tengo/.test(lower)) {
        let html = '<table><tr><th>Ticker</th><th>Nombre</th><th>Sent.</th><th>Score</th></tr>';
        WATCHLIST.forEach(s => {
          html += `<tr><td><strong>${s.ticker}</strong></td><td>${s.name}</td><td>${s.sentiment}</td><td>${s.score}</td></tr>`;
        });
        html += '</table>';
        return html;
      }

      // Skills info
      if (/skills?|que\s*(puedes|sabes)\s*hacer|capacidades|ayuda/.test(lower)) {
        let html = '<table><tr><th>Skill</th><th>Trigger</th></tr>';
        SKILLS_INFO.forEach(s => {
          html += `<tr><td><strong>${s.name}</strong></td><td>${s.trigger}</td></tr>`;
        });
        html += '</table><br>Con Ollama conectado, puedo responder cualquier pregunta. Sin Ollama, manejo datos locales y copio consultas complejas para Claude Code.';
        return html;
      }

      // Identity
      if (/qui[ée]n\s*(soy|eres)|sobre\s*m[ií]|mi\s*perfil/.test(lower)) {
        return 'Eres Jorge, cubano en Florida. Director of Operations en Robotic Imaging. Trader de Forex y opciones. Emprendedor con TRAVIA Logistics. Fotografo y piloto de drones. Estas construyendo un sistema agentico tipo Jarvis — y aqui estamos.';
      }

      // Time/date
      if (/qu[ée]\s*(hora|d[ií]a|fecha)/.test(lower)) {
        const now = new Date();
        return `Son las ${now.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'})}. Hoy es ${now.toLocaleDateString('es-MX', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}.`;
      }

      // Trading methodology
      if (/opciones|options|framework|metodolog[ií]a|r[ée]gimen/.test(lower)) {
        return 'Tu framework de opciones: Regimen → Expected Move → IV/RV → Skew → Catalyst → Liquidez → Estructura → Riesgo. 5 activos core: SPX, QQQ, IWM, NVDA, TLT. Score 8+ para trade A. Regla dura: no naked options. ¿Quieres profundizar en algun aspecto?';
      }

      // Daily brief
      if (/brief.*d[ií]a|qu[ée]\s*hay.*hoy|morning|resumen/.test(lower)) {
        const now = new Date();
        const day = now.toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'long'});
        return `Brief de ${day}:<br><br><strong>Watchlist:</strong> ${WATCHLIST.length} acciones monitoreadas. Top: NVDA (7.2), 2454.TW (7.1), MSFT (7.0).<br><br><strong>Trading:</strong> Framework de opciones activo. 50 activos en universo de escaneo.<br><br><strong>Pendiente:</strong> Conectar API Schwab, paper trading, datos de Google Takeout.<br><br>¿Quieres profundizar en algo?`;
      }

      return null;
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || div.innerText || '';
    }

    function formatFallback(query) {
      return `No tengo Ollama conectado para responder eso con AI. Copie tu pregunta al clipboard:<br><br><pre>${escapeHtml(query)}</pre><br>Pegala en Claude Code para una respuesta completa. O conecta Ollama en configuracion.`;
    }

    // ── Ollama Bridge (streaming) ──────────────────────────────

    async function queryOllama(prompt) {
      const url = document.getElementById('ollamaUrl').value.replace(/\/+$/, '');
      const model = document.getElementById('ollamaModel').value;

      // Build conversation context from recent messages
      const recentMsgs = Array.from(conversation.querySelectorAll('.msg'))
        .slice(-10)
        .map(el => {
          const isUser = el.classList.contains('user');
          const text = el.textContent.replace('JARVIS', '').trim();
          return isUser ? `Usuario: ${text}` : `JARVIS: ${text}`;
        }).join('\n');

      const fullPrompt = recentMsgs ? `${recentMsgs}\nUsuario: ${prompt}\nJARVIS:` : prompt;

      try {
        const res = await fetch(url + '/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model,
            prompt: fullPrompt,
            system: SYSTEM_PROMPT,
            stream: true,
            options: { temperature: 0.7, num_predict: 800 }
          })
        });
        if (!res.ok) return null;

        // Create the message container for streaming
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg jarvis';
        msgDiv.innerHTML = '<div class="label">JARVIS</div><p></p>';
        conversation.appendChild(msgDiv);
        const textEl = msgDiv.querySelector('p');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const json = JSON.parse(line);
              if (json.response) {
                fullText += json.response;
                textEl.textContent = fullText;
                conversation.scrollTop = conversation.scrollHeight;
              }
            } catch {}
          }
        }

        saveConversation();
        return fullText || null;
      } catch {
        return null;
      }
    }

    async function testOllamaConnection() {
      const url = document.getElementById('ollamaUrl').value.replace(/\/+$/, '');
      const dot = document.getElementById('connDot');
      const txt = document.getElementById('connText');

      txt.textContent = 'Probando...';
      try {
        const res = await fetch(url + '/api/tags', { signal: AbortSignal.timeout(5000) });
        if (res.ok) {
          const data = await res.json();
          const models = data.models?.map(m => m.name) || [];
          ollamaConnected = true;
          dot.classList.add('connected');
          txt.textContent = `Ollama: conectado (${models.length} modelos)`;
          showToast('Ollama conectado');
        } else {
          throw new Error('Not OK');
        }
      } catch {
        ollamaConnected = false;
        dot.classList.remove('connected');
        txt.textContent = 'Ollama: desconectado';
        showToast('No se pudo conectar a Ollama');
      }
    }

    // ── UI Helpers ──────────────────────────────────────────────

    function addMessage(content, type, isHtml) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      if (type === 'jarvis') {
        div.innerHTML = '<div class="label">JARVIS</div>';
      }
      if (isHtml) {
        div.innerHTML += content;
      } else {
        const p = document.createElement('p');
        p.textContent = content;
        div.appendChild(p);
      }
      conversation.appendChild(div);
      conversation.scrollTop = conversation.scrollHeight;
      saveConversation();
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function saveConversation() {
      const msgs = Array.from(conversation.children).map(el => ({
        type: el.classList.contains('user') ? 'user' : 'jarvis',
        html: el.innerHTML
      }));
      try {
        localStorage.setItem('jarvis-conversation', JSON.stringify(msgs.slice(-50)));
      } catch {}
    }

    function loadConversation() {
      try {
        const msgs = JSON.parse(localStorage.getItem('jarvis-conversation'));
        if (!msgs || !msgs.length) return false;
        msgs.forEach(m => {
          const div = document.createElement('div');
          div.className = `msg ${m.type}`;
          div.innerHTML = m.html;
          conversation.appendChild(div);
        });
        conversation.scrollTop = conversation.scrollHeight;
        return true;
      } catch { return false; }
    }

    function clearConversation() {
      conversation.innerHTML = '';
      localStorage.removeItem('jarvis-conversation');
      addMessage('Conversacion limpia. ¿En que te ayudo?', 'jarvis');
      saveConversation();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Settings ────────────────────────────────────────────────

    function openSettings() {
      settingsDrawer.classList.add('open');
      settingsOverlay.classList.add('open');
    }
    function closeSettings() {
      settingsDrawer.classList.remove('open');
      settingsOverlay.classList.remove('open');
      saveSettings();
    }

    function saveSettings() {
      const cfg = {
        ollamaUrl: document.getElementById('ollamaUrl').value,
        ollamaModel: document.getElementById('ollamaModel').value,
        wakeWord: wakeWordEnabled,
        tts: ttsEnabled,
        continuous: continuousMode,
        voiceRate: document.getElementById('voiceRate').value
      };
      localStorage.setItem('jarvis-config', JSON.stringify(cfg));
    }

    function loadSettings() {
      try {
        const cfg = JSON.parse(localStorage.getItem('jarvis-config'));
        if (!cfg) return;
        document.getElementById('ollamaUrl').value = cfg.ollamaUrl || 'http://localhost:11434';
        document.getElementById('ollamaModel').value = cfg.ollamaModel || 'llama3.1:8b';
        wakeWordEnabled = cfg.wakeWord || false;
        ttsEnabled = cfg.tts !== false;
        continuousMode = cfg.continuous || false;
        document.getElementById('voiceRate').value = cfg.voiceRate || 1;
        document.getElementById('wakeToggle').classList.toggle('on', wakeWordEnabled);
        document.getElementById('ttsToggle').classList.toggle('on', ttsEnabled);
        document.getElementById('continuousToggle').classList.toggle('on', continuousMode);
      } catch {}
    }

    // ── Event Listeners ─────────────────────────────────────────

    orb.addEventListener('click', toggleListening);
    orb.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') toggleListening(); });

    micBtn.addEventListener('click', toggleListening);

    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && textInput.value.trim()) {
        handleInput(textInput.value.trim());
        textInput.value = '';
      }
    });

    settingsBtn.addEventListener('click', openSettings);
    settingsOverlay.addEventListener('click', closeSettings);
    document.getElementById('clearBtn').addEventListener('click', clearConversation);

    document.getElementById('testConn').addEventListener('click', testOllamaConnection);

    document.getElementById('wakeToggle').addEventListener('click', function() {
      wakeWordEnabled = !wakeWordEnabled;
      this.classList.toggle('on', wakeWordEnabled);
      showToast(wakeWordEnabled ? 'Wake word activado' : 'Wake word desactivado');
    });

    document.getElementById('ttsToggle').addEventListener('click', function() {
      ttsEnabled = !ttsEnabled;
      this.classList.toggle('on', ttsEnabled);
    });

    document.getElementById('continuousToggle').addEventListener('click', function() {
      continuousMode = !continuousMode;
      this.classList.toggle('on', continuousMode);
      showToast(continuousMode ? 'Modo continuo: escucho sin parar' : 'Modo normal');
    });

    // ── Init ────────────────────────────────────────────────────

    loadSettings();

    // Load saved conversation or show welcome
    if (!loadConversation()) {
      addMessage('Hola Jorge. Soy JARVIS. Toca el orb o el microfono para hablarme. También puedes escribir abajo.', 'jarvis');
    }

    // Auto-test Ollama on load
    setTimeout(async () => {
      await testOllamaConnection();
      if (ollamaConnected) {
        showToast('Ollama conectado — cerebro AI activo');
      }
    }, 800);
  </script>
