const cv = document.getElementById('c');
const cx = cv.getContext('2d');

function resize() {
  cv.width = innerWidth;
  cv.height = innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); resetLayout(); });

// ── FORCE LAYOUT ─────────────────────────────────────────────────

  const jn = NODES.find(n=>n.id==='jarvis');
  jn.x = W/2; jn.y = H/2; jn.vx=0; jn.vy=0;

  // Arrange others in rough rings
  const others = NODES.filter(n=>n.id!=='jarvis');
  const topLevel = ['claude-md','brain','skills','vault','pwa'];
  const ring1 = NODES.filter(n=>topLevel.includes(n.id));
  const ring2 = NODES.filter(n=>!topLevel.includes(n.id)&&n.id!=='jarvis'&&
    ['core','brain','skills','vault','pwa'].includes(n.type));
  const ext = NODES.filter(n=>n.type==='external');

  const r1 = Math.min(W,H)*0.22;
  ring1.forEach((n,i)=>{
    const a = (i/ring1.length)*Math.PI*2 - Math.PI/2;
    n.x = W/2 + Math.cos(a)*r1 + (Math.random()-.5)*30;
    n.y = H/2 + Math.sin(a)*r1 + (Math.random()-.5)*30;
    n.vx=0; n.vy=0;
  });

  const r2 = Math.min(W,H)*0.42;
  ring2.forEach((n,i)=>{
    const a = (i/ring2.length)*Math.PI*2 - Math.PI/2;
    n.x = W/2 + Math.cos(a)*r2 + (Math.random()-.5)*40;
    n.y = H/2 + Math.sin(a)*r2 + (Math.random()-.5)*40;
    n.vx=0; n.vy=0;
  });

  const r3 = Math.min(W,H)*0.52;
  ext.forEach((n,i)=>{
    const a = (i/ext.length)*Math.PI*2 + Math.PI/4;
    n.x = W/2 + Math.cos(a)*r3;
    n.y = H/2 + Math.sin(a)*r3;
    n.vx=0; n.vy=0;
  });
}
resetLayout();

// Build link map for fast lookup
const linkMap = LINKS.map(l=>({
  ...l,
  sn: NODES.find(n=>n.id===l.s),
  tn: NODES.find(n=>n.id===l.t),
})).filter(l=>l.sn&&l.tn);

// Force simulation
const REPEL = 4200, SPRING = 0.04, LEN = 130, DAMP = 0.82, CENTER = 0.012;

function tick() {
  const jn = NODES.find(n=>n.id==='jarvis');

  NODES.forEach(a=>{
    if(a.fixed) return;
    // Center pull
    a.vx += (W/2 - a.x)*CENTER*0.3;
    a.vy += (H/2 - a.y)*CENTER*0.3;

    // Repulsion
    NODES.forEach(b=>{
      if(a===b) return;
      const dx=a.x-b.x, dy=a.y-b.y;
      const d2=dx*dx+dy*dy||1;
      const d=Math.sqrt(d2);
      const f=REPEL/(d2*Math.max(d,1));
      a.vx+=dx*f; a.vy+=dy*f;
    });
  });

  // Springs
  linkMap.forEach(l=>{
    const a=l.sn, b=l.tn;
    const dx=b.x-a.x, dy=b.y-a.y;
    const d=Math.hypot(dx,dy)||1;
    const tdist = l.tp==='has'?90:LEN;
    const f=(d-tdist)*SPRING;
    const fx=dx/d*f, fy=dy/d*f;
    if(!a.fixed){a.vx+=fx;a.vy+=fy;}
    if(!b.fixed){b.vx-=fx;b.vy-=fy;}
  });

  NODES.forEach(n=>{
    if(n.fixed) return;
    n.vx*=DAMP; n.vy*=DAMP;
    n.x+=n.vx; n.y+=n.vy;
    // Clamp
    n.x=Math.max(n.r+4, Math.min(W-n.r-4, n.x));
    n.y=Math.max(n.r+44, Math.min(H-n.r-4, n.y));
  });
}

// ── VIEWPORT ────────────────────────────────────────────────────
let vx=0, vy=0, vz=1;

function toScreen(wx, wy){
  return {x:(wx+vx)*vz + W/2*(1-vz), y:(wy+vy)*vz + H/2*(1-vz)};
}
function toWorld(sx, sy){
  return {x:(sx - W/2*(1-vz))/vz - vx, y:(sy - H/2*(1-vz))/vz - vy};
}

// ── FILTER ───────────────────────────────────────────────────────
let activeFilter = 'all';
function isVisible(n){ return activeFilter==='all'||n.type===activeFilter; }
function isLinkVisible(l){ return isVisible(l.sn)&&isVisible(l.tn); }

// ── DRAW ─────────────────────────────────────────────────────────
let pulse=0;
let selectedId=null;

const LCOL={core:'rgba(255,255,255,.7)',reads:'rgba(87,168,255,.4)',act:'rgba(0,212,160,.5)',
  has:'rgba(255,255,255,.12)',iface:'rgba(168,85,247,.5)',sync:'rgba(255,107,53,.4)',
  sec:'rgba(255,71,87,.5)',writes:'rgba(0,212,160,.4)'};

// Background particles
const pts=Array.from({length:60},()=>({
  x:Math.random()*3000-500,y:Math.random()*2000-300,
  vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.5+.4
}));

function drawFrame(){
  cx.clearRect(0,0,W,H);

  // Bg particles
  cx.save();
  cx.globalAlpha=0.3;
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<-600)p.x=W+200; if(p.x>W+400)p.x=-400;
    if(p.y<-400)p.y=H+200; if(p.y>H+400)p.y=-400;
    const s=toScreen(p.x,p.y);
    cx.beginPath();cx.arc(s.x,s.y,p.r,0,Math.PI*2);
    cx.fillStyle='#57a8ff';cx.fill();
  });
  cx.restore();

  // Links
  linkMap.forEach(l=>{
    const a=toScreen(l.sn.x,l.sn.y), b=toScreen(l.tn.x,l.tn.y);
    const vis=isLinkVisible(l);
    const dimmed=selectedId&&l.sn.id!==selectedId&&l.tn.id!==selectedId;
    cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);
    cx.strokeStyle=LCOL[l.tp]||'rgba(255,255,255,.1)';
    cx.globalAlpha=!vis?0.04:dimmed?0.05:1;
    cx.lineWidth=l.tp==='core'?2:l.tp==='has'?.7:1.4;
    cx.setLineDash(l.tp==='has'?[3,3]:[]);
    cx.stroke();
    cx.setLineDash([]);
    cx.globalAlpha=1;

    // Arrow (non-has links)
    if(l.tp!=='has'&&vis&&!dimmed){
      const angle=Math.atan2(b.y-a.y,b.x-a.x);
      const tr=toScreen(l.tn.x,l.tn.y);
      // Move arrow to edge of target circle
      const dist=Math.hypot(b.x-a.x,b.y-a.y);
      const ratio=(dist-l.tn.r*vz-3)/Math.max(dist,1);
      const ax=a.x+(b.x-a.x)*ratio, ay=a.y+(b.y-a.y)*ratio;
      cx.save();cx.translate(ax,ay);cx.rotate(angle);
      cx.beginPath();cx.moveTo(0,0);cx.lineTo(-8,-4);cx.lineTo(-8,4);cx.closePath();
      cx.fillStyle=LCOL[l.tp]||'rgba(255,255,255,.2)';
      cx.globalAlpha=.5;cx.fill();cx.restore();cx.globalAlpha=1;
    }
  });

  // Nodes
  pulse=(pulse+0.04)%Math.PI;
  NODES.forEach(n=>{
    const p=toScreen(n.x,n.y);
    const col=COL[n.type]||'#fff';
    const vis=isVisible(n);
    const dimmed=selectedId&&n.id!==selectedId&&!isConnected(n.id,selectedId);
    cx.globalAlpha=!vis?0.08:dimmed?0.1:1;

    // Glow ring (active nodes)
    if(n.status==='active'&&!dimmed&&vis){
      const glow=n.id==='jarvis'?18:10;
      const grd=cx.createRadialGradient(p.x,p.y,n.r*vz,p.x,p.y,n.r*vz+glow);
      grd.addColorStop(0,col+'44'); grd.addColorStop(1,col+'00');
      cx.beginPath();cx.arc(p.x,p.y,n.r*vz+glow,0,Math.PI*2);
      cx.fillStyle=grd;cx.fill();
    }

    // Pulse ring for JARVIS
    if(n.id==='jarvis'){
      const pr=(n.r+8+Math.sin(pulse)*6)*vz;
      cx.beginPath();cx.arc(p.x,p.y,pr,0,Math.PI*2);
      cx.strokeStyle=col;cx.globalAlpha=0.25+Math.sin(pulse)*0.15;
      cx.lineWidth=1.5;cx.stroke();cx.globalAlpha=vis?1:0.08;
    }

    // Circle fill
    cx.beginPath();cx.arc(p.x,p.y,n.r*vz,0,Math.PI*2);
    cx.fillStyle=n.id==='jarvis'?col+'25':col+'15';cx.fill();

    // Circle stroke
    cx.beginPath();cx.arc(p.x,p.y,n.r*vz,0,Math.PI*2);
    cx.strokeStyle=col;
    cx.lineWidth=n.id==='jarvis'?2.5:n.status==='encrypted'?2:1.5;
    if(n.status==='planned') cx.setLineDash([5,4]);
    cx.stroke();cx.setLineDash([]);

    // Status dot
    const sdx=p.x+n.r*vz*.72, sdy=p.y-n.r*vz*.72;
    cx.beginPath();cx.arc(sdx,sdy,3.5,0,Math.PI*2);
    cx.fillStyle=SCOL[n.status]||'#7d8590';cx.fill();
    cx.beginPath();cx.arc(sdx,sdy,3.5,0,Math.PI*2);
    cx.strokeStyle='#070a0f';cx.lineWidth=1.5;cx.stroke();

    cx.globalAlpha=!vis?0.08:dimmed?0.1:1;

    // Label
    cx.fillStyle=col;
    cx.font=`${n.id==='jarvis'?'800':'700'} ${Math.max(8,Math.min(12,n.r*vz*.55+7))}px 'Segoe UI',sans-serif`;
    cx.textAlign='center';
    cx.fillText(n.label, p.x, p.y+n.r*vz+13);

    cx.globalAlpha=1;
  });

  tick();
  requestAnimationFrame(drawFrame);
}
drawFrame();

function isConnected(a, b){
  return linkMap.some(l=>(l.sn.id===a&&l.tn.id===b)||(l.sn.id===b&&l.tn.id===a));
}

// ── PANEL ────────────────────────────────────────────────────────
const panel=document.getElementById('panel');
const pc=document.getElementById('pc');
const tip=document.getElementById('tip');

function openPanel(n){
  selectedId=n.id;
  const col=COL[n.type]||'#fff';
  const scol=SCOL[n.status]||'#7d8590';
  const out=linkMap.filter(l=>l.sn.id===n.id);
  const inc=linkMap.filter(l=>l.tn.id===n.id);

  pc.innerHTML=`
    <div class="pbadge" style="background:${col}1a;color:${col};border:1px solid ${col}33">${TL[n.type]||n.type}</div>
    <div class="ptitle">${n.label}</div>
    <div class="pstatus">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${scol}"></span>
      ${SL[n.status]||n.status}${n.lines?' · '+n.lines:''}
    </div>
    <div class="pdesc" style="border-left-color:${col}">${n.desc}</div>
    ${n.files?`<div class="psec"><h4>Archivos</h4>${n.files.map(f=>`<div class="pfile">${f}</div>`).join('')}</div>`:''}
    ${out.length?`<div class="psec"><h4>Sale hacia →</h4>${out.map(l=>`
      <div class="pconn" onclick="focusNode('${l.tn.id}')">
        <span class="pconn-lbl">${l.lbl}</span>
        <span class="pconn-name" style="color:${COL[l.tn.type]||'#fff'}">${l.tn.label}</span>
      </div>`).join('')}</div>`:''}
    ${inc.length?`<div class="psec"><h4>Viene de ←</h4>${inc.map(l=>`
      <div class="pconn" onclick="focusNode('${l.sn.id}')">
        <span class="pconn-name" style="color:${COL[l.sn.type]||'#fff'}">${l.sn.label}</span>
        <span class="pconn-lbl">${l.lbl}</span>
      </div>`).join('')}</div>`:''}
  `;
  panel.classList.add('open');
}

document.getElementById('px').onclick=e=>{e.stopPropagation();closePanel();};
function closePanel(){panel.classList.remove('open');selectedId=null;}

window.focusNode=id=>{
  const n=NODES.find(n=>n.id===id);
  if(n){openPanel(n);vx=W/2-n.x;vy=H/2-n.y;}
};

// ── MOUSE ────────────────────────────────────────────────────────
let drag=null, lastMX=0, lastMY=0, dragging=false;

function hitTest(mx,my){
  const w=toWorld(mx,my);
  for(let i=NODES.length-1;i>=0;i--){
    const n=NODES[i];
    if(!isVisible(n)) continue;
    const dx=n.x-w.x, dy=n.y-w.y;
    if(dx*dx+dy*dy<=(n.r+6)*(n.r+6)) return n;
  }
  return null;
}

cv.addEventListener('mousedown',e=>{
  const n=hitTest(e.clientX,e.clientY);
  if(n){drag={node:n,ox:e.clientX-n.x*vz,oy:e.clientY-n.y*vz};dragging=false;}
  else{drag={pan:true};}
  lastMX=e.clientX;lastMY=e.clientY;
  cv.classList.add('grabbing');
});

cv.addEventListener('mousemove',e=>{
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  if(drag){
    if(drag.node){
      if(Math.abs(dx)>2||Math.abs(dy)>2) dragging=true;
      if(dragging){
        const w=toWorld(e.clientX,e.clientY);
        drag.node.x=w.x; drag.node.y=w.y;
        drag.node.vx=0; drag.node.vy=0;
      }
    } else {
      vx+=dx/vz; vy+=dy/vz;
    }
  }
  lastMX=e.clientX;lastMY=e.clientY;

  const n=hitTest(e.clientX,e.clientY);
  if(n&&!drag){
    tip.style.display='block';
    tip.innerHTML=`<strong style="color:${COL[n.type]}">${n.label}</strong><span>${n.desc.slice(0,85)}…</span>`;
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';
  } else {
    tip.style.display='none';
  }
});

cv.addEventListener('mouseup',e=>{
  cv.classList.remove('grabbing');
  if(drag&&drag.node&&!dragging){
    tip.style.display='none';
    openPanel(drag.node);
  }
  if(drag&&drag.pan&&Math.abs(e.clientX-lastMX)<3){
    closePanel();
  }
  drag=null;
});

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.88:1.14;
  const before=toWorld(e.clientX,e.clientY);
  vz=Math.max(0.2,Math.min(4,vz*delta));
  const after=toWorld(e.clientX,e.clientY);
  vx+=after.x-before.x; vy+=after.y-before.y;
},{passive:false});

// Touch
let lastTouch=null, lastDist=0;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    const t=e.touches[0];
    lastTouch={x:t.clientX,y:t.clientY};
    const n=hitTest(t.clientX,t.clientY);
    if(n) drag={node:n};
    else drag={pan:true};
    dragging=false;
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastDist=Math.hypot(dx,dy);
    drag=null;
  }
},{passive:true});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){
    const t=e.touches[0];
    const dx=t.clientX-lastTouch.x, dy=t.clientY-lastTouch.y;
    if(drag.node){
      if(Math.abs(dx)>3||Math.abs(dy)>3) dragging=true;
      if(dragging){const w=toWorld(t.clientX,t.clientY);drag.node.x=w.x;drag.node.y=w.y;drag.node.vx=0;drag.node.vy=0;}
    } else {vx+=dx/vz;vy+=dy/vz;}
    lastTouch={x:t.clientX,y:t.clientY};
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.hypot(dx,dy);
    const delta=dist/lastDist;
    vz=Math.max(0.2,Math.min(4,vz*delta));
    lastDist=dist;
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  if(drag&&drag.node&&!dragging){openPanel(drag.node);}
  if(drag&&drag.pan&&!dragging){closePanel();}
  drag=null;
});

// ── ZOOM BUTTONS ────────────────────────────────────────────────
document.getElementById('zi').onclick=()=>{vz=Math.min(4,vz*1.3);};
document.getElementById('zo').onclick=()=>{vz=Math.max(0.2,vz*0.77);};
document.getElementById('zr').onclick=()=>{vx=0;vy=0;vz=0.85;};

// ── FILTERS ──────────────────────────────────────────────────────
document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter=btn.dataset.t;
    closePanel();
  });
});
</script>
</body>
</html>
