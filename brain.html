  });
  linkMap.forEach(l=>{const a=l.sn,b=l.tn,dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,td=l.tp==='has'?90:LEN,f=(d-td)*SPRING,fx=dx/d*f,fy=dy/d*f;if(!a.fixed){a.vx+=fx;a.vy+=fy;}if(!b.fixed){b.vx-=fx;b.vy-=fy;}});
  NODES.forEach(n=>{if(n.fixed)return;n.vx*=DAMP;n.vy*=DAMP;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+4,Math.min(W-n.r-4,n.x));n.y=Math.max(n.r+44,Math.min(H-n.r-4,n.y));});
}
let vx=0,vy=0,vz=1;
function toScreen(wx,wy){return{x:(wx+vx)*vz+W/2*(1-vz),y:(wy+vy)*vz+H/2*(1-vz)};}
function toWorld(sx,sy){return{x:(sx-W/2*(1-vz))/vz-vx,y:(sy-H/2*(1-vz))/vz-vy};}
let activeFilter='all';
function isVis(n){return activeFilter==='all'||n.type===activeFilter;}
let pulse=0,selectedId=null;
const LCOL={core:'rgba(255,255,255,.7)',reads:'rgba(87,168,255,.4)',act:'rgba(0,212,160,.5)',has:'rgba(255,255,255,.12)',iface:'rgba(168,85,247,.5)',sync:'rgba(255,107,53,.4)',sec:'rgba(255,71,87,.5)',writes:'rgba(0,212,160,.4)'};
const pts=Array.from({length:60},()=>({x:Math.random()*3000-500,y:Math.random()*2000-300,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.5+.4}));
function drawFrame(){
  cx.clearRect(0,0,W,H);
  cx.save();cx.globalAlpha=.3;
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<-600)p.x=W+200;if(p.x>W+400)p.x=-400;if(p.y<-400)p.y=H+200;if(p.y>H+400)p.y=-400;const s=toScreen(p.x,p.y);cx.beginPath();cx.arc(s.x,s.y,p.r,0,Math.PI*2);cx.fillStyle='#57a8ff';cx.fill();});
  cx.restore();
  linkMap.forEach(l=>{
    const a=toScreen(l.sn.x,l.sn.y),b=toScreen(l.tn.x,l.tn.y),vis=isVis(l.sn)&&isVis(l.tn),dim=selectedId&&l.sn.id!==selectedId&&l.tn.id!==selectedId;
    cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);
    cx.strokeStyle=LCOL[l.tp]||'rgba(255,255,255,.1)';
    cx.globalAlpha=!vis?.04:dim?.05:1;cx.lineWidth=l.tp==='core'?2:l.tp==='has'?.7:1.4;
    cx.setLineDash(l.tp==='has'?[3,3]:[]);cx.stroke();cx.setLineDash([]);cx.globalAlpha=1;
    if(l.tp!=='has'&&vis&&!dim){const ang=Math.atan2(b.y-a.y,b.x-a.x),dist=Math.hypot(b.x-a.x,b.y-a.y),ratio=(dist-l.tn.r*vz-3)/Math.max(dist,1),ax2=a.x+(b.x-a.x)*ratio,ay2=a.y+(b.y-a.y)*ratio;cx.save();cx.translate(ax2,ay2);cx.rotate(ang);cx.beginPath();cx.moveTo(0,0);cx.lineTo(-8,-4);cx.lineTo(-8,4);cx.closePath();cx.fillStyle=LCOL[l.tp]||'rgba(255,255,255,.2)';cx.globalAlpha=.5;cx.fill();cx.restore();cx.globalAlpha=1;}
  });
  pulse=(pulse+0.04)%Math.PI;
  NODES.forEach(n=>{
    const p=toScreen(n.x,n.y),col=COL[n.type]||'#fff',vis=isVis(n),dim=selectedId&&n.id!==selectedId&&!linkMap.some(l=>(l.sn.id===n.id&&l.tn.id===selectedId)||(l.tn.id===n.id&&l.sn.id===selectedId));
    cx.globalAlpha=!vis?.08:dim?.1:1;
    if(n.status==='active'&&!dim&&vis){const glow=n.id==='jarvis'?18:10,grd=cx.createRadialGradient(p.x,p.y,n.r*vz,p.x,p.y,n.r*vz+glow);grd.addColorStop(0,col+'44');grd.addColorStop(1,col+'00');cx.beginPath();cx.arc(p.x,p.y,n.r*vz+glow,0,Math.PI*2);cx.fillStyle=grd;cx.fill();}
    if(n.id==='jarvis'){const pr=(n.r+8+Math.sin(pulse)*6)*vz;cx.beginPath();cx.arc(p.x,p.y,pr,0,Math.PI*2);cx.strokeStyle=col;cx.globalAlpha=.25+Math.sin(pulse)*.15;cx.lineWidth=1.5;cx.stroke();cx.globalAlpha=vis?1:.08;}
    cx.beginPath();cx.arc(p.x,p.y,n.r*vz,0,Math.PI*2);cx.fillStyle=n.id==='jarvis'?col+'25':col+'15';cx.fill();
    cx.beginPath();cx.arc(p.x,p.y,n.r*vz,0,Math.PI*2);cx.strokeStyle=col;cx.lineWidth=n.id==='jarvis'?2.5:n.status==='encrypted'?2:1.5;
    if(n.status==='planned')cx.setLineDash([5,4]);cx.stroke();cx.setLineDash([]);
    const sdx=p.x+n.r*vz*.72,sdy=p.y-n.r*vz*.72;cx.beginPath();cx.arc(sdx,sdy,3.5,0,Math.PI*2);cx.fillStyle=SCOL[n.status]||'#7d8590';cx.fill();cx.beginPath();cx.arc(sdx,sdy,3.5,0,Math.PI*2);cx.strokeStyle='#070a0f';cx.lineWidth=1.5;cx.stroke();
    cx.globalAlpha=!vis?.08:dim?.1:1;cx.fillStyle=col;
    cx.font=`${n.id==='jarvis'?'800':'700'} ${Math.max(8,Math.min(12,n.r*vz*.55+7))}px 'Segoe UI',sans-serif`;
    cx.textAlign='center';cx.fillText(n.label,p.x,p.y+n.r*vz+13);cx.globalAlpha=1;
  });
  tick();requestAnimationFrame(drawFrame);
}
drawFrame();
const panel=document.getElementById('panel'),pc=document.getElementById('pc'),tip=document.getElementById('tip');
function openPanel(n){
  selectedId=n.id;const col=COL[n.type]||'#fff',scol=SCOL[n.status]||'#7d8590';
  const out=linkMap.filter(l=>l.sn.id===n.id),inc=linkMap.filter(l=>l.tn.id===n.id);
  pc.innerHTML=`<div class="pbadge" style="background:${col}1a;color:${col};border:1px solid ${col}33">${TL[n.type]||n.type}</div><div class="ptitle">${n.label}</div><div class="pstatus"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${scol}"></span> ${SL[n.status]||n.status}${n.lines?' · '+n.lines:''}</div><div class="pdesc" style="border-left-color:${col}">${n.desc}</div>${n.files?'<div class="psec"><h4>Archivos</h4>'+n.files.map(f=>'<div class="pfile">'+f+'</div>').join('')+'</div>':''}${out.length?'<div class="psec"><h4>Sale hacia →</h4>'+out.map(l=>'<div class="pconn" onclick="focusNode(\''+l.tn.id+'\')" ><span class="pconn-lbl">'+l.lbl+'</span><span class="pconn-name" style="color:'+COL[l.tn.type]+'">'+l.tn.label+'</span></div>').join('')+'</div>':''}${inc.length?'<div class="psec"><h4>Viene de ←</h4>'+inc.map(l=>'<div class="pconn" onclick="focusNode(\''+l.sn.id+'\')" ><span class="pconn-name" style="color:'+COL[l.sn.type]+'">'+l.sn.label+'</span><span class="pconn-lbl">'+l.lbl+'</span></div>').join('')+'</div>':''}`;
  panel.classList.add('open');
}
document.getElementById('px').onclick=e=>{e.stopPropagation();panel.classList.remove('open');selectedId=null;};
window.focusNode=id=>{const n=NODES.find(n=>n.id===id);if(n){openPanel(n);vx=W/2-n.x;vy=H/2-n.y;}};
let drag=null,lastMX=0,lastMY=0,dragging=false;
function hitTest(mx,my){const w=toWorld(mx,my);for(let i=NODES.length-1;i>=0;i--){const n=NODES[i];if(!isVis(n))continue;const dx=n.x-w.x,dy=n.y-w.y;if(dx*dx+dy*dy<=(n.r+6)*(n.r+6))return n;}return null;}
cv.addEventListener('mousedown',e=>{const n=hitTest(e.clientX,e.clientY);if(n){drag={node:n};dragging=false;}else drag={pan:true};lastMX=e.clientX;lastMY=e.clientY;cv.classList.add('grabbing');});
cv.addEventListener('mousemove',e=>{const dx=e.clientX-lastMX,dy=e.clientY-lastMY;if(drag){if(drag.node){if(Math.abs(dx)>2||Math.abs(dy)>2)dragging=true;if(dragging){const w=toWorld(e.clientX,e.clientY);drag.node.x=w.x;drag.node.y=w.y;drag.node.vx=0;drag.node.vy=0;}}else{vx+=dx/vz;vy+=dy/vz;}}lastMX=e.clientX;lastMY=e.clientY;const n=hitTest(e.clientX,e.clientY);if(n&&!drag){tip.style.display='block';tip.innerHTML='<strong style="color:'+COL[n.type]+'">'+n.label+'</strong><span>'+n.desc.slice(0,85)+'…</span>';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';}else tip.style.display='none';});
cv.addEventListener('mouseup',e=>{cv.classList.remove('grabbing');if(drag&&drag.node&&!dragging){tip.style.display='none';openPanel(drag.node);}if(drag&&drag.pan&&Math.abs(e.clientX-lastMX)<3){panel.classList.remove('open');selectedId=null;}drag=null;});
cv.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?.88:1.14,before=toWorld(e.clientX,e.clientY);vz=Math.max(.2,Math.min(4,vz*d));const after=toWorld(e.clientX,e.clientY);vx+=after.x-before.x;vy+=after.y-before.y;},{passive:false});
document.getElementById('zi').onclick=()=>{vz=Math.min(4,vz*1.3);};
document.getElementById('zo').onclick=()=>{vz=Math.max(.2,vz*.77);};
document.getElementById('zr').onclick=()=>{vx=0;vy=0;vz=1;};
document.querySelectorAll('.fb').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');activeFilter=btn.dataset.t;panel.classList.remove('open');selectedId=null;}));
</script>
</body>
