const cvs = document.getElementById('bg');
const ctx = cvs.getContext('2d');
function resize() { cvs.width = innerWidth; cvs.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const pts = Array.from({length:70}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
  r:Math.random()*1.5+.5
}));

(function drawBg() {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  pts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>cvs.width) p.vx*=-1;
    if(p.y<0||p.y>cvs.height) p.vy*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(87,168,255,.6)'; ctx.fill();
  });
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++) {
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
    if(d<110) {
      ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(87,168,255,${.12*(1-d/110)})`; ctx.lineWidth=.5; ctx.stroke();
    }
  }
  requestAnimationFrame(drawBg);
})();

   desc:'Gestión de Gmail/correo pendiente de implementar. Lee brain/sync/shared-context.md para saber quién es Jorge. Se conecta con vault/email/ de Research OS para triage. Esperando datos de Google Takeout para configurar.',
   files:['brain/sync/shared-context.md (referencia)','vault/email/ (destino)'],lines:'Planificado'},
];

const links = [
  {s:'claude-md',t:'jarvis',lbl:'dirige',tp:'core'},
  {s:'jarvis',t:'brain',lbl:'lee',tp:'reads'},
  {s:'jarvis',t:'skills',lbl:'activa',tp:'activates'},
  {s:'jarvis',t:'vault',lbl:'accede',tp:'reads'},
  {s:'jarvis',t:'pwa',lbl:'interfaz',tp:'interface'},
  {s:'brain',t:'brain-identity',lbl:'contiene',tp:'contains'},
  {s:'brain',t:'brain-memory',lbl:'contiene',tp:'contains'},
  {s:'brain',t:'brain-sync',lbl:'contiene',tp:'contains'},
  {s:'brain',t:'brain-security',lbl:'contiene',tp:'contains'},
  {s:'brain-identity',t:'brain-security',lbl:'cifrado por',tp:'security'},
  {s:'brain-sync',t:'robin-hood',lbl:'contexto',tp:'sync'},
  {s:'brain-sync',t:'mt5-ftmo',lbl:'contexto',tp:'sync'},
  {s:'brain-sync',t:'email-agent',lbl:'contexto',tp:'sync'},
  {s:'skills',t:'sk-research',lbl:'módulo',tp:'contains'},
  {s:'skills',t:'sk-trading',lbl:'módulo',tp:'contains'},
  {s:'skills',t:'sk-email',lbl:'módulo',tp:'contains'},
  {s:'skills',t:'sk-social',lbl:'módulo',tp:'contains'},
  {s:'skills',t:'sk-daily',lbl:'módulo',tp:'contains'},
  {s:'sk-research',t:'vt-research',lbl:'escribe',tp:'writes'},
  {s:'sk-trading',t:'vt-trading',lbl:'escribe',tp:'writes'},
  {s:'sk-email',t:'vt-email',lbl:'escribe',tp:'writes'},
  {s:'sk-social',t:'vt-social',lbl:'escribe',tp:'writes'},
  {s:'sk-daily',t:'vt-daily',lbl:'escribe',tp:'writes'},
  {s:'sk-daily',t:'vt-research',lbl:'lee',tp:'reads'},
  {s:'sk-daily',t:'vt-trading',lbl:'lee',tp:'reads'},
  {s:'vault',t:'vt-research',lbl:'contiene',tp:'contains'},
  {s:'vault',t:'vt-trading',lbl:'contiene',tp:'contains'},
  {s:'vault',t:'vt-daily',lbl:'contiene',tp:'contains'},
  {s:'vault',t:'vt-email',lbl:'contiene',tp:'contains'},
  {s:'vault',t:'vt-social',lbl:'contiene',tp:'contains'},
  {s:'pwa',t:'jarvis-html',lbl:'contiene',tp:'contains'},
  {s:'pwa',t:'index-html',lbl:'contiene',tp:'contains'},
  {s:'vt-research',t:'vt-trading',lbl:'informa',tp:'informs'},
  {s:'robin-hood',t:'vt-trading',lbl:'alimenta',tp:'feeds'},
];

// ── D3 SIMULATION ──────────────────────────────────────────────
const gc = document.getElementById('gc');
const W = gc.clientWidth, H = gc.clientHeight;
const svg = d3.select('#graph').attr('width',W).attr('height',H);
const defs = svg.append('defs');

['arrow','arrow-dim'].forEach((id,i) => {
  defs.append('marker').attr('id',id)
    .attr('viewBox','0 -5 10 10').attr('refX',22).attr('refY',0)
    .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
    .append('path').attr('d','M0,-5L10,0L0,5')
    .attr('fill', i===0 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.04)');
});

const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.2,4])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

document.getElementById('zi').onclick = () => svg.transition().call(zoom.scaleBy,1.35);
document.getElementById('zo').onclick = () => svg.transition().call(zoom.scaleBy,0.75);
document.getElementById('zr').onclick = () => svg.transition().call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.8));

const simLinks = links.map(l => ({...l, source:l.s, target:l.t}));

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(simLinks).id(d=>d.id)
    .distance(d => ({core:90,contains:75,reads:150,writes:150,activates:140,interface:130,sync:200,security:60,informs:120,feeds:160}[d.tp]||130))
    .strength(0.65))
  .force('charge', d3.forceManyBody().strength(d => -(d.sz||20)*14))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide().radius(d => (d.sz||20)+22));

const jn = nodes.find(n=>n.id==='jarvis');
if(jn) { jn.fx=W/2; jn.fy=H/2; }

// Link colors
const LC = {reads:'rgba(87,168,255,.35)',writes:'rgba(0,212,160,.35)',contains:'rgba(255,255,255,.1)',
  activates:'rgba(0,212,160,.5)',interface:'rgba(168,85,247,.5)',sync:'rgba(255,107,53,.35)',
  security:'rgba(255,71,87,.5)',informs:'rgba(245,166,35,.35)',feeds:'rgba(255,107,53,.4)',core:'rgba(255,255,255,.6)'};

const lnkSel = g.append('g').selectAll('line').data(simLinks).enter().append('line')
  .attr('class','lnk')
  .attr('stroke', d => LC[d.tp]||'rgba(255,255,255,.1)')
  .attr('stroke-width', d => d.tp==='core'?2.5:d.tp==='contains'?.8:1.5)
  .attr('stroke-dasharray', d => d.tp==='contains'?'3,3':null)
  .attr('marker-end', d => d.tp!=='contains'?'url(#arrow)':null);

const nodeSel = g.append('g').selectAll('.node').data(nodes).enter().append('g')
  .attr('class','node')
  .call(d3.drag()
    .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
    .on('end',(e,d)=>{ if(!e.active) sim.alphaTarget(0); if(d.id!=='jarvis'){d.fx=null;d.fy=null;} })
  );

// Glow filter
const filt = defs.append('filter').attr('id','glow');
filt.append('feGaussianBlur').attr('stdDeviation','4').attr('result','coloredBlur');
const fm = filt.append('feMerge');
fm.append('feMergeNode').attr('in','coloredBlur');
fm.append('feMergeNode').attr('in','SourceGraphic');

// Circle
nodeSel.append('circle')
  .attr('r', d=>d.sz||20)
  .attr('fill', d => d.id==='jarvis' ? C[d.type]+'18' : C[d.type]+'12')
  .attr('stroke', d => C[d.type]||'#fff')
  .attr('stroke-width', d => d.id==='jarvis'?3:d.status==='encrypted'?2.5:1.5)
  .attr('stroke-dasharray', d => d.status==='planned'?'5,4':null)
  .style('filter', d => d.status==='active'||d.id==='jarvis'?'url(#glow)':null);

// Status dot
nodeSel.append('circle').attr('class','status-dot')
  .attr('r',3.5)
  .attr('cx', d=>(d.sz||20)*.72)
  .attr('cy', d=>-(d.sz||20)*.72)
  .attr('fill', d=>SC[d.status]||'#7d8590')
  .attr('stroke','#070a0f').attr('stroke-width',1.5);

// Label
nodeSel.append('text')
  .attr('dy', d=>(d.sz||20)+13)
  .text(d=>d.label)
  .attr('fill', d=>C[d.type]||'#fff')
  .attr('font-size', d=>d.id==='jarvis'?13:d.sz>28?11:10)
  .attr('font-weight', d=>d.id==='jarvis'?800:600)
  .attr('text-anchor','middle')
  .style('text-shadow','0 0 8px currentColor');

// Pulse JARVIS
(function pulse() {
  nodeSel.filter(d=>d.id==='jarvis').select('circle')
    .transition().duration(1400).attr('stroke-width',5)
    .transition().duration(1400).attr('stroke-width',3)
    .on('end', pulse);
})();

sim.on('tick',()=>{
  lnkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

// Initial zoom
svg.call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.82).translate(-W/2,-H/2));

// ── PANEL ──────────────────────────────────────────────────────
const panel = document.getElementById('panel');
const pcontent = document.getElementById('pcontent');
const tip = document.getElementById('tip');

function openPanel(d) {
  const col = C[d.type]||'#fff';
  const scol = SC[d.status]||'#7d8590';
  const out = simLinks.filter(l=>l.source.id===d.id);
  const inc = simLinks.filter(l=>l.target.id===d.id);

  pcontent.innerHTML = `
    <div class="pbadge" style="background:${col}1a;color:${col};border:1px solid ${col}33">${TL[d.type]||d.type}</div>
    <div class="ptitle">${d.label}</div>
    <div class="pstatus">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${scol}"></span>
      ${SL[d.status]||d.status}${d.lines?` · ${d.lines}`:''}
    </div>
    <div class="pdesc" style="border-left-color:${col}">${d.desc}</div>
    ${d.files?`<div class="psec"><h4>Archivos</h4>${d.files.map(f=>`<div class="pfile">${f}</div>`).join('')}</div>`:''}
    ${out.length?`<div class="psec"><h4>Sale hacia →</h4>${out.map(l=>{
      const tn = nodes.find(n=>n.id===l.target.id);
      return `<div class="pconn" onclick="focusNode('${l.target.id}')">
        <span class="pconn-label">${l.lbl||''}</span>
        <span class="pconn-name" style="color:${C[(tn||{}).type]||'#fff'}">${l.target.label||l.target.id}</span>
      </div>`;}).join('')}</div>`:''}
    ${inc.length?`<div class="psec"><h4>Viene de ←</h4>${inc.map(l=>{
      const sn = nodes.find(n=>n.id===l.source.id);
      return `<div class="pconn" onclick="focusNode('${l.source.id}')">
        <span class="pconn-name" style="color:${C[(sn||{}).type]||'#fff'}">${l.source.label||l.source.id}</span>
        <span class="pconn-label">${l.lbl||''}</span>
      </div>`;}).join('')}</div>`:''}
  `;
  panel.classList.add('open');
}

document.getElementById('pclose').addEventListener('click', e => { e.stopPropagation(); closePanel(); clearHL(); });
svg.on('click', () => { closePanel(); clearHL(); });
function closePanel() { panel.classList.remove('open'); }

function hlConn(d) {
  const ids = new Set([d.id]);
  simLinks.forEach(l => {
    if(l.source.id===d.id) ids.add(l.target.id);
    if(l.target.id===d.id) ids.add(l.source.id);
  });
  nodeSel.classed('dim', n => !ids.has(n.id));
  lnkSel.classed('dim', l => !ids.has(l.source.id)||!ids.has(l.target.id));
}
function clearHL() { nodeSel.classed('dim',false); lnkSel.classed('dim',false); }

nodeSel
  .on('mouseover',(e,d) => {
    tip.style.display='block';
    tip.innerHTML=`<strong style="color:${C[d.type]}">${d.label}</strong><span>${d.desc.slice(0,90)}…</span>`;
  })
  .on('mousemove', e => { tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-8)+'px'; })
  .on('mouseout', () => { tip.style.display='none'; })
  .on('click',(e,d) => { e.stopPropagation(); tip.style.display='none'; openPanel(d); hlConn(d); });

// ── FILTERS ────────────────────────────────────────────────────
document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    const t = btn.dataset.t;
    if(t==='all') { clearHL(); return; }
    const ids = new Set(nodes.filter(n=>n.type===t).map(n=>n.id));
    nodeSel.classed('dim', n => !ids.has(n.id));
    lnkSel.classed('dim', l => !ids.has(l.source.id)&&!ids.has(l.target.id));
    closePanel();
  });
});

// Global for panel clicks
window.focusNode = id => {
  const d = nodes.find(n=>n.id===id);
  if(!d) return;
  openPanel(d); hlConn(d);
  if(d.x&&d.y) svg.transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(W/2-d.x,H/2-d.y).scale(1));
};
</script>
</body>
</html>
